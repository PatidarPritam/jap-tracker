# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - japtracker-web

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/main_japtracker-web.yml'
  workflow_dispatch:

env:
  # Backend API base URL is inlined into the frontend at BUILD time.
  NEXT_PUBLIC_API_BASE_URL: https://japtracker-api-g0ghd2chf7eqg3h6.centralindia-01.azurewebsites.net

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: npm install, build (frontend, standalone)
        working-directory: frontend
        run: |
          npm ci
          npm run build
          # Assemble the self-contained standalone server for deployment.
          rm -rf "$GITHUB_WORKSPACE/deploy"
          mkdir -p "$GITHUB_WORKSPACE/deploy"
          cp -r .next/standalone/. "$GITHUB_WORKSPACE/deploy/"
          cp -r .next/static "$GITHUB_WORKSPACE/deploy/.next/static"
          if [ -d public ]; then cp -r public "$GITHUB_WORKSPACE/deploy/public"; fi

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy
          # .next is a hidden folder; v4 skips hidden files unless this is set.
          include-hidden-files: true

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_4CF3F0BB924B43D5A5BCA48D15A47AF9 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_579C0968C09248C7BD0736F8A4F9E10A }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_C6D8B92B22854B1BB49C8E8BF374DE09 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'japtracker-web'
          slot-name: 'Production'
          package: .
